<style>

  --g:#00FF87;
  --g-bdr:rgba(0,255,135,.22);

  --r:16px;

  --fh:'Teko',sans-serif;
  --fb:'Plus Jakarta Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--fb);
  background:var(--bg);
  color:var(--t);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:28px;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  background:
    radial-gradient(ellipse 110% 50% at 50% -5%,rgba(0,255,135,.07) 0%,transparent 60%),

  background-size:30px 30px;
}
.z1{position:relative;z-index:1}
.g{color:var(--g)}
.err-code{
  font-family:var(--fh);
  font-size:clamp(6rem,20vw,12rem);
  font-weight:700;
  line-height:1;
  color:var(--g);
  text-shadow:0 0 40px rgba(0,255,135,.3);
  margin-bottom:16px;
}
.err-title{
  font-family:var(--fh);
  font-size:clamp(1.4rem,4vw,2rem);
  text-transform:uppercase;
  letter-spacing:2px;
  margin-bottom:12px;
}
.err-msg{
  font-size:1rem;
  color:var(--t2);
  line-height:1.7;
  max-width:420px;
  margin:0 auto 32px;
}
.btn-home{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  background:var(--g);
  color:#001C0E;
  padding:16px 32px;
  border-radius:var(--r);
  font-family:var(--fh);
  font-size:1.1rem;
  letter-spacing:1px;
  text-transform:uppercase;
  text-decoration:none;
  box-shadow:0 8px 32px rgba(0,255,135,.32);
  transition:filter .2s,transform .15s;
}
.btn-home:hover{filter:brightness(1.1);transform:translateY(-2px)}
.btn-home svg{width:20px;height:20px;fill:#001C0E}
.logo{
  font-family:var(--fh);
  font-size:1.4rem;
  letter-spacing:1px;
